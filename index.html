    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050505;
      --primary: #00ff88;
      --secondary: #aaaaaa;
      --accent: #00bfff;
      --warning: #ffb347;
      --error: #ff5555;
      --glow: rgba(0, 255, 136, 0.5);
    }

    html { font-size: 16px; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* CRT Effects */
    .crt-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 10000;
    }

    .crt-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(
        transparent 50%,
        rgba(0, 0, 0, 0.1) 50%
      );
      background-size: 100% 4px;
      animation: scanlines 0.1s linear infinite;
    }

    .crt-overlay::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.3) 100%);
    }

    @keyframes scanlines {
      0% { background-position: 0 0; }
      100% { background-position: 0 4px; }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.8; }
      94% { opacity: 1; }
      97% { opacity: 0.9; }
    }

    @keyframes glow-pulse {
      0%, 100% { text-shadow: 0 0 5px var(--glow), 0 0 10px var(--glow); }
      50% { text-shadow: 0 0 10px var(--glow), 0 0 20px var(--glow), 0 0 30px var(--glow); }
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @keyframes matrix-fall {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    @keyframes boot-up {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes progress {
      0% { width: 0; }
      100% { width: var(--progress); }
    }

    /* Matrix Background */
    #matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
      opacity: 0.15;
    }

    /* Boot Screen */
    #boot-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #boot-screen.hidden { display: none; }

    .boot-line {
      opacity: 0;
      animation: boot-up 0.3s ease forwards;
      margin: 5px 0;
      font-size: 14px;
    }

    .boot-ok { color: var(--primary); }
    .boot-warn { color: var(--warning); }
    .boot-info { color: var(--accent); }

    /* Main Container */
    #main-container {
      max-width: 100%;
      min-height: 100vh;
      padding: 20px;
      animation: flicker 10s infinite;
    }

    /* Terminal */
    #terminal {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(5, 5, 5, 0.95);
      border: 1px solid var(--primary);
      border-radius: 8px;
      box-shadow: 0 0 20px var(--glow), inset 0 0 60px rgba(0, 255, 136, 0.03);
      overflow: hidden;
    }

    .terminal-header {
      background: rgba(0, 255, 136, 0.1);
      padding: 10px 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(0, 255, 136, 0.3);
    }

    .terminal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot-red { background: #ff5f56; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green { background: #27c93f; }

    .terminal-title {
      flex: 1;
      text-align: center;
      font-size: 13px;
      color: var(--secondary);
    }

    .terminal-body {
      padding: 20px;
      min-height: 60vh;
      max-height: 85vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) var(--bg);
    }

    .terminal-body::-webkit-scrollbar { width: 8px; }
    .terminal-body::-webkit-scrollbar-track { background: var(--bg); }
    .terminal-body::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

    /* Output */
    .output { margin: 10px 0; white-space: pre-wrap; word-wrap: break-word; }

    .prompt {
      color: var(--accent);
      font-weight: 600;
    }

    .command { color: var(--primary); }

    .result {

      padding-left: 10px;
      border-left: 2px solid rgba(0, 255, 136, 0.3);

    .result-title {

    .highlight { color: var(--primary); }

    .info { color: var(--accent); }

      animation: blink 1s infinite;
      vertical-align: middle;
    }

    .counter-item {

    .counter-value {

    }

    .counter-label {
      font-size: 12px;
      color: var(--secondary);

    /* Matrix Rain Overlay */

      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
      z-index: 9000;
      display: none;
    }

    #matrix-overlay.active { display: block; }

    #matrix-overlay canvas {
      width: 100%;
      height: 100%;
    }

    /* Hack Animation */

      opacity: 0;

    /* Theme Variations */

      --glow: rgba(255, 179, 71, 0.5);

      .ascii-art { font-size: 8px; }
      .terminal-title { font-size: 11px; }
      .result-title { font-size: 16px; }
      #main-container { padding: 10px; }
    }
  </style>

    // ================== TERMINAL FUNCTIONS ==================
    function addOutput(html, prefix = '', noNewline = false) {
      const output = document.getElementById('terminal-output');
      const inputLine = output.querySelector('.input-line');

      const div = document.createElement('div');
      div.className = 'output';

      if (prefix) {
        div.innerHTML = `<span class="prompt">${prefix}</span> ${html}`;
      } else {
        div.innerHTML = html;
      }

      output.insertBefore(div, inputLine);

      if (!noNewline) {
        output.scrollTop = output.scrollHeight;
      }
    }

    function addCommandChips(commands) {
      const html = `<div class="command-chips">${commands.map(cmd =>
        `<button class="chip" onclick="executeCommand('${cmd}')">${cmd}</button>`
      ).join('')}</div>`;
      addOutput(html, '', true);
    }

    function executeCommand(cmd) {
      const input = document.getElementById('command-input');
      input.value = cmd;
      processCommand(cmd);
    }

    function processCommand(cmd) {
      const trimmedCmd = cmd.trim().toLowerCase();

      if (!trimmedCmd) return;

      commandHistory.unshift(trimmedCmd);
      historyIndex = -1;

      addOutput(`<span class="command">${trimmedCmd}</span>`, 'kapish@portfolio:~$');

      const [command, ...args] = trimmedCmd.split(' ');

      switch (command) {
        case 'help': showHelp(); break;
        case 'about': showAbout(); break;
        case 'education': showEducation(); break;
        case 'experience': showExperience(); break;
        case 'skills': showSkills(); break;
        case 'projects': showProjects(); break;
        case 'research': showResearch(); break;
        case 'achievements': showAchievements(); break;
        case 'github': showGithub(); break;
        case 'linkedin': openLink(PORTFOLIO_DATA.linkedin); break;
        case 'resume': showResume(); break;
        case 'contact': showContact(); break;
        case 'whoami': showWhoami(); break;
        case 'matrix': launchMatrix(); break;
        case 'hack': launchHack(); break;
        case 'theme': changeTheme(args[0]); break;
        case 'clear': clearTerminal(); break;
        case 'exit': showExit(); break;
        default:
          addOutput(`<span class="error">Command not found: ${command}</span>`);
          addOutput(`<span class="dim">Type 'help' for available commands.</span>`);
      }

      addOutput('');
    }

    function launchMatrix() {
      const overlay = document.getElementById('matrix-overlay');
      overlay.classList.add('active');

      const canvas = document.getElementById('matrix-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
      const fontSize = 14;
      const columns = canvas.width / fontSize;
      const drops = [];

      for (let i = 0; i < columns; i++) {
        drops[i] = Math.random() * canvas.height / fontSize;
      }

      let frameCount = 0;
      const maxFrames = 300;

      function drawMatrix() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--primary').trim();
        ctx.font = fontSize + 'px JetBrains Mono';

        for (let i = 0; i < drops.length; i++) {
          const text = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);

          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }

        frameCount++;
        if (frameCount < maxFrames) {
          requestAnimationFrame(drawMatrix);
        } else {
          overlay.classList.remove('active');
        }
      }

      drawMatrix();

      setTimeout(() => {
        overlay.classList.remove('active');
      }, 5000);
    }

    function changeTheme(theme) {
      const body = document.body;
      body.classList.remove('theme-amber', 'theme-blue');

      if (theme === 'amber') {
        body.classList.add('theme-amber');
        currentTheme = 'amber';
      } else if (theme === 'blue') {

        currentTheme = 'blue';

      addOutput(`<span class="highlight">Theme changed to: ${currentTheme}</span>`);

    // ================== EVENT HANDLERS ==================
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('command-input');

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const cmd = input.value;
          processCommand(cmd);
          input.value = '';
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (historyIndex < commandHistory.length - 1) {
            historyIndex++;
            input.value = commandHistory[historyIndex];
          }
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (historyIndex > 0) {
            historyIndex--;
            input.value = commandHistory[historyIndex];
          } else {
            historyIndex = -1;
            input.value = '';
          }
        } else if (e.key === 'Tab') {
          e.preventDefault();
          const partial = input.value.toLowerCase();
          const match = COMMANDS.find(cmd => cmd.startsWith(partial));
          if (match) {
            input.value = match;
          }
        }
      });

      input.focus();
    });

    document.addEventListener('click', () => {
      document.getElementById('command-input').focus();
    });

      const chars = '01';

      function draw() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#00ff88';
        ctx.font = fontSize + 'px JetBrains Mono';

          const text = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);

          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }

        requestAnimationFrame(draw);
      }

      draw();
    }
